<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Resume Builder</h1>
            <p>Upload your resume, and let AI completely rebuild it for you!</p>
        </header>

        <main>
            <div class="upload-area" id="drop-zone">
                <div class="upload-icon">📄</div>
                <h3>Drag & Drop your Resume here</h3>
                <p>or</p>
                <label for="file-input" class="browse-btn">Browse Files</label>
                <input type="file" id="file-input" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg" hidden>
                <p id="file-name" class="file-name"></p>
            </div>

            <div class="user-inputs">
                <h3>What should AI add to your new resume?</h3>
                <div class="checkbox-group">
                    <label class="custom-checkbox"><input type="checkbox" id="add-skills"> Add Missing Skills</label>
                    <label class="custom-checkbox"><input type="checkbox" id="improve-desc"> Improve Descriptions</label>
                    <label class="custom-checkbox"><input type="checkbox" id="fix-format"> Fix Formatting</label>
                </div>
            </div>

            <button id="analyze-btn" class="analyze-btn" disabled>Build My New Resume</button>

            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>AI is rewriting and building your new resume...</p>
            </div>

            <div id="results" class="results-section hidden">
                <h2>Your AI Generated Resume</h2>
                <div id="new-resume-content" style="background: white; padding: 30px; border: 1px solid #ccc; border-radius: 5px; color: black; text-align: left; margin-bottom: 20px; font-family: Arial, sans-serif;">
                </div>
                
                <button id="download-btn" class="analyze-btn" style="background: #e74c3c;">Download as PDF</button>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
